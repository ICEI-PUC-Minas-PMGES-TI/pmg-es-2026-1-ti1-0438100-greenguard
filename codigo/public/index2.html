<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tela Genérica</title>
  <link rel="stylesheet" href="./assets/css/styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
    rel="stylesheet">
 <script src="./assets/js/login.js"></script>
</head>
<body>
<div class="modal-overlay" id="modalPost">
  <div class="post-card-modal">

    <label class="field-label">Descrição do fato ocorrido :</label>
    <textarea class="desc-textarea" id="descricao"
      placeholder="Descreva o que aconteceu..."></textarea>

    <div class="section-row">

      <div>
        <label class="field-label">Este post é ?</label>
        <div class="category-group" id="catGroup">
          <button class="cat-btn assalto active"  data-cat="Assalto">Assalto</button>
          <button class="cat-btn reclamacao"       data-cat="Reclamação">Reclamação</button>
          <button class="cat-btn seguranca"        data-cat="Segurança">Segurança</button>
        </div>
      </div>

      <div>
        <label class="field-label">Parque do ocorrido :</label>
        <input class="park-input" id="parque" type="text"
          placeholder="Ex : Parque Ecológico Pampulha">
      </div>

      <div style="align-self:flex-end;">
        <div class="photo-box" id="photoBox">
          <span class="plus-icon">+</span>
          <i class="bi bi-camera"></i>
          <input type="file" accept="image/*" id="photoInput"
                 onchange="previewPhoto(event)">
        </div>
      </div>

    </div>

    <button class="send-btn" onclick="enviar()">Enviar</button>

  </div>
</div> 
</body>
